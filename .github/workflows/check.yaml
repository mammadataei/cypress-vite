name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - name: Lint & TS Check
        run: pnpm check

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - name: Build
        run: pnpm build

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Each permitted Vite version against same version of Cypress
          - vite-version: '2.9'
            cypress-version: 14
            plugin-react-version: '1'
          - vite-version: '3'
            cypress-version: 14
            plugin-react-version: '2'
          - vite-version: '4'
            cypress-version: 14
            plugin-react-version: '3'
          - vite-version: '5'
            cypress-version: 14
            plugin-react-version: '4'
          - vite-version: '6'
            cypress-version: 14
            plugin-react-version: '4'
          - vite-version: '7'
            cypress-version: 14
            plugin-react-version: '4'
          - vite-version: '8'
            cypress-version: 14
            plugin-react-version: '6'
          # Each Cypress version against latest permitted Vite version
          - vite-version: '8'
            cypress-version: 12
            plugin-react-version: '6'
          - vite-version: '8'
            cypress-version: 13
            plugin-react-version: '6'
          - vite-version: '8'
            cypress-version: 14
            plugin-react-version: '6'
          - vite-version: '8'
            cypress-version: 15
            plugin-react-version: '6'

    name:
      test (vite@${{ matrix.vite-version }}, cypress@${{ matrix.cypress-version
      }})

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "::set-output name=pnpm_cache_dir::$(pnpm store path)"

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
            ~/.cache/Cypress
          key:
            ${{ runner.os }}-pnpm-store-vite${{ matrix.vite-version
            }}-cypress${{ matrix.cypress-version }}-${{
            hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-vite${{ matrix.vite-version }}-cypress${{ matrix.cypress-version }}-
            ${{ runner.os }}-pnpm-store-vite${{ matrix.vite-version }}-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm i

      - name: Override Vite version
        run:
          pnpm --filter example add vite@${{ matrix.vite-version }}
          @vitejs/plugin-react@${{ matrix.plugin-react-version }}

      - name: Override Cypress version
        run: pnpm --filter example add cypress@${{ matrix.cypress-version }}

      - name: Run Tests
        uses: cypress-io/github-action@v7.1.10
        with:
          install: false
          build: pnpm build
          start: pnpm example dev
          command: pnpm example test:ci
